[build]
builder = "nixpacks"
buildCommand = "pip install -r requirements.txt"

[deploy]
startCommand = "python bot/main.py"
restartPolicyType = "always"
numReplicas = 1

[service]
healthcheckPath = "/"
healthcheckTimeout = 30

[env]
PYTHONUNBUFFERED = "1"
PYTHON_VERSION = "3.12"

[build.volumes]
data = "/app/data"
temp = "/app/temp"
logs = "/app/logs"
